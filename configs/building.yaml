# Building geometry configuration
# Single-floor building: 30 m x 20 m x 3 m — DO NOT CHANGE.

domain:
  x_m: 30.0          # Building length (X axis) in meters
  y_m: 20.0          # Building width  (Y axis) in meters
  z_m: 3.0           # Ceiling height  (Z axis) in meters

grid:
  nx: 60             # Cells along X  (= 30 / 0.5)
  ny: 40             # Cells along Y  (= 20 / 0.5)
  nz: 6              # Cells along Z  (= 3.0 / 0.5)
  cell_size_m: 0.5   # FIXED resolution — never change to 0.2 m

# Exit locations in world coordinates (meters).
# Z=0.0 means ground-floor door.
exits:
  - name: "main_exit"
    x: 30.0
    y: 10.0
    z: 0.0
  - name: "side_exit"
    x: 0.0
    y: 20.0
    z: 0.0

# Ventilation: BOTH doors are open in ALL scenarios.
# Ventilation variation is out of scope for this project.
ventilation:
  both_doors_open: true

# Interior obstacles (walls, partitions) — populated per FDS scenario.
# Each entry: {name: str, x_min, x_max, y_min, y_max, z_min, z_max} in meters.
obstacles: []
